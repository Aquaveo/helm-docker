# This is a basic workflow to help you get started with Actions

name: kaniko_build

on:
  push:
    branches: [ master, cscott ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Kaniko Builder
      uses: aevea/action-kaniko@v0.3.2
      with:
        image: aquaveollc/helm-docker
        tag: latest
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        cache: true 
        cache_registry: aquaveollc/helm-docker-cache
        build_file: ${{github.workspace}}/Dockerfile  
        
